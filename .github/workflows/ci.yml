name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate CLI + Extension Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Python + Node toolchain versions
        run: python scripts/verify_toolchain_versions.py --check-python --check-node
      - name: Verify locked release metadata
        run: python scripts/verify_release_metadata.py

      - name: Install Python package
        run: python -m pip install -e .

      - name: Generate Python SBOM report
        run: python scripts/generate_python_sbom.py

      - name: Upload Python SBOM report
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom-report
          path: build/reports/python-sbom.json

      - name: Validate local CLI
        run: ./scripts/validate_local_cli.sh

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Run extension E2E tests
        timeout-minutes: 10
        run: timeout 10m xvfb-run -a npm test
        working-directory: extension

      - name: Upload E2E debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-e2e-debug
          path: extension/.vscode-test/**
          if-no-files-found: ignore

  build-backend-matrix:
    name: Build Backend (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs:
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Python toolchain version
        run: python scripts/verify_toolchain_versions.py --check-python

      - name: Build backend artifact
        shell: bash
        run: ./scripts/build_vscode_backend.sh

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.target }}
          path: build/vscode-backend-artifacts/${{ matrix.target }}/**

  package-macos:
    name: Package VSIX (darwin-arm64)
    runs-on: macos-14
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - name: Verify Python + Node toolchain versions
        run: python scripts/verify_toolchain_versions.py --check-python --check-node

      - name: Build backend artifact
        run: ./scripts/build_vscode_backend.sh

      - name: Matrix preflight (CI target set)
        run: REQUIRED_TARGETS="darwin-arm64" ./scripts/check_vscode_backend_matrix.sh

      - name: Package extension with strict gate
        run: REQUIRED_TARGETS="darwin-arm64" STRICT_MATRIX=1 ./scripts/package_vscode_extension.sh

      - name: Verify packaged VSIX backend integrity
        run: python scripts/verify_vsix_backend_integrity.py extension/persona-counsel-vscode-darwin-arm64.vsix darwin-arm64

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: persona-counsel-vsix-darwin-arm64
          path: extension/*.vsix

  package-windows:
    name: Package VSIX (win32-x64)
    runs-on: windows-latest
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - name: Verify Python + Node toolchain versions
        run: python scripts/verify_toolchain_versions.py --check-python --check-node

      - name: Build backend artifact
        shell: bash
        run: ./scripts/build_vscode_backend.sh

      - name: Matrix preflight (CI target set)
        shell: bash
        run: REQUIRED_TARGETS="win32-x64" ./scripts/check_vscode_backend_matrix.sh

      - name: Package extension with strict gate
        shell: bash
        run: REQUIRED_TARGETS="win32-x64" PACKAGE_TARGETS="win32-x64" STRICT_MATRIX=1 ./scripts/package_vscode_extension.sh

      - name: Verify packaged VSIX backend integrity
        shell: bash
        run: python scripts/verify_vsix_backend_integrity.py extension/persona-counsel-vscode-win32-x64.vsix win32-x64

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: persona-counsel-vsix-win32-x64
          path: extension/*.vsix

  package-linux:
    name: Package VSIX (linux-x64)
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - name: Verify Python + Node toolchain versions
        run: python scripts/verify_toolchain_versions.py --check-python --check-node

      - name: Build backend artifact
        shell: bash
        run: ./scripts/build_vscode_backend.sh

      - name: Matrix preflight (CI target set)
        shell: bash
        run: REQUIRED_TARGETS="linux-x64" ./scripts/check_vscode_backend_matrix.sh

      - name: Package baseline VSIX (simulated previous)
        shell: bash
        run: |
          cp extension/package.json /tmp/extension.package.json.bak
          python - <<'PY'
          import json
          p = "extension/package.json"
          data = json.load(open(p, "r", encoding="utf-8"))
          # Use a guaranteed older semver baseline for upgrade-path checks.
          data["version"] = "0.0.0-baseline.0"
          json.dump(data, open(p, "w", encoding="utf-8"), indent=2)
          print("baseline version:", data["version"])
          PY
          REQUIRED_TARGETS="linux-x64" PACKAGE_TARGETS="linux-x64" STRICT_MATRIX=1 ./scripts/package_vscode_extension.sh
          mv extension/persona-counsel-vscode-linux-x64.vsix extension/persona-counsel-vscode-linux-x64-baseline.vsix
          mv /tmp/extension.package.json.bak extension/package.json

      - name: Package extension with strict gate
        shell: bash
        run: REQUIRED_TARGETS="linux-x64" PACKAGE_TARGETS="linux-x64" STRICT_MATRIX=1 ./scripts/package_vscode_extension.sh

      - name: Verify baseline VSIX backend integrity
        shell: bash
        run: python scripts/verify_vsix_backend_integrity.py extension/persona-counsel-vscode-linux-x64-baseline.vsix linux-x64

      - name: Verify packaged VSIX backend integrity
        shell: bash
        run: python scripts/verify_vsix_backend_integrity.py extension/persona-counsel-vscode-linux-x64.vsix linux-x64

      - name: Verify VSIX upgrade-path compatibility
        shell: bash
        run: python scripts/verify_vsix_upgrade_path.py extension/persona-counsel-vscode-linux-x64-baseline.vsix extension/persona-counsel-vscode-linux-x64.vsix linux-x64

      - name: Smoke test baseline and current VSIX backends
        shell: bash
        run: |
          SKIP_COUNSEL_PATH_CHECK=1 ./scripts/smoke_test_vsix_backend.sh extension/persona-counsel-vscode-linux-x64-baseline.vsix linux-x64
          SKIP_COUNSEL_PATH_CHECK=1 ./scripts/smoke_test_vsix_backend.sh extension/persona-counsel-vscode-linux-x64.vsix linux-x64

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: persona-counsel-vsix-linux-x64
          path: extension/persona-counsel-vscode-linux-x64.vsix

  smoke-vsix-clean-machine:
    name: Smoke Test VSIX Backend (clean machine)
    runs-on: macos-14
    needs:
      - package-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: persona-counsel-vsix-darwin-arm64
          path: /tmp/persona-counsel-vsix

      - name: Validate bundled backend from VSIX
        shell: bash
        run: |
          VSIX_PATH="$(ls /tmp/persona-counsel-vsix/*.vsix | head -n 1)"
          ./scripts/smoke_test_vsix_backend.sh "$VSIX_PATH" darwin-arm64

  smoke-vsix-clean-machine-windows:
    name: Smoke Test VSIX Backend (clean machine windows)
    runs-on: windows-latest
    needs:
      - package-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: persona-counsel-vsix-win32-x64
          path: ${{ runner.temp }}\persona-counsel-vsix

      - name: Validate bundled backend from VSIX
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "$env:RUNNER_TEMP\persona-counsel-vsix" -Filter *.vsix | Select-Object -First 1
          if (-not $vsix) { throw "No VSIX found in downloaded artifact directory." }
          ./scripts/smoke_test_vsix_backend.ps1 -VsixPath $vsix.FullName -Target win32-x64

  smoke-vsix-clean-machine-linux:
    name: Smoke Test VSIX Backend (clean machine linux)
    runs-on: ubuntu-latest
    needs:
      - package-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: persona-counsel-vsix-linux-x64
          path: /tmp/persona-counsel-vsix

      - name: Validate bundled backend from VSIX
        shell: bash
        run: |
          VSIX_PATH="$(ls /tmp/persona-counsel-vsix/*.vsix | head -n 1)"
          ./scripts/smoke_test_vsix_backend.sh "$VSIX_PATH" linux-x64
